  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      user-select: none; /* تجنب تحديد النص أثناء النقر المزدوج */
    }

    body {
      background: #050505;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
    }

    /* =========================
       شاشة البداية
    ========================= */
    .start-screen {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050505;
      padding: 20px;
      position: absolute;
      top: 0;
      left: 0;
      transition: opacity 0.2s ease;
    }

    .start-box {
      width: min(420px, 100%);
      background: #0d0d0d;
      border: 3px solid #2b2b2b;
      border-radius: 28px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.05);
      backdrop-filter: blur(2px);
    }

    .title {
      color: white;
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 800;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .inputs {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .inputs input {
      width: 100%;
      max-width: 100px;
      height: 80px;
      background: #050505;
      border: 2px solid #333;
      border-radius: 20px;
      color: white;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: bold;
      text-align: center;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .inputs input:focus {
      border-color: #888;
      transform: scale(1.02);
    }

    .start-btn {
      height: 70px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 2px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .start-btn:active {
      transform: scale(0.97);
    }

    /* =========================
       شاشة العداد
    ========================= */
    .timer-screen {
      width: 100%;
      height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      background: #050505;
      padding: 20px;
      position: absolute;
      top: 0;
      left: 0;
    }

    .clock {
      display: flex;
      gap: clamp(12px, 4vw, 40px);
      width: 100%;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .card {
      width: min(210px, 26vw);
      height: min(250px, 34vw);
      min-width: 100px;
      min-height: 130px;
      background: #0d0d0d;
      border: 3px solid #2b2b2b;
      border-radius: 28px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.08);
      transition: all 0.1s;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 50%, rgba(0,0,0,0.4));
      pointer-events: none;
    }

    .number {
      color: #f5f5f5;
      font-size: clamp(70px, 12vw, 180px);
      font-weight: 800;
      letter-spacing: 6px;
      text-shadow: 0 5px 10px #00000055, 0 0 20px rgba(255,255,255,0.2);
      font-variant-numeric: tabular-nums;
    }

    /* رسالة تلميح صغيرة للنقر المزدوج */
    .hint-tip {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: #6a6a6a;
      font-size: 13px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      width: fit-content;
      margin: 0 auto;
      padding: 6px 14px;
      border-radius: 40px;
      pointer-events: none;
      z-index: 10;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    @media (max-width: 550px) {
      .inputs input {
        max-width: 80px;
        height: 65px;
      }
      .start-box {
        padding: 30px 20px;
      }
    }

    /* تأثير ناعم لل pause */
    .paused-effect {
      opacity: 0.7;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>

<!-- شاشة البداية -->
<div class="start-screen" id="startScreen">
  <div class="start-box">
    <div class="title">⏱️ START TIMER</div>
    <div class="inputs">
      <input type="number" id="hoursInput" placeholder="HH" min="0" value="0">
      <input type="number" id="minutesInput" placeholder="MM" min="0" value="0">
      <input type="number" id="secondsInput" placeholder="SS" min="0" value="0">
    </div>
    <button class="start-btn" id="startBtn">▶ START</button>
  </div>
</div>

<!-- شاشة المؤقت -->
<div class="timer-screen" id="timerScreen">
  <div class="clock">
    <div class="card">
      <div class="number" id="hours">00</div>
    </div>
    <div class="card">
      <div class="number" id="minutes">00</div>
    </div>
    <div class="card">
      <div class="number" id="seconds">00</div>
    </div>
  </div>
  <div class="hint-tip">✨ اضغط مرتين (Double click) لإيقاف / تشغيل المؤقت ✨</div>
</div>

<script>
  (function() {
    // عناصر DOM
    const startScreen = document.getElementById('startScreen');
    const timerScreen = document.getElementById('timerScreen');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const startBtn = document.getElementById('startBtn');
    const hoursInput = document.getElementById('hoursInput');
    const minutesInput = document.getElementById('minutesInput');
    const secondsInput = document.getElementById('secondsInput');

    // متغيرات الحالة
    let totalSeconds = 0;          // الوقت المنقضي منذ بدء العد (أو المستمر)
    let targetSeconds = 0;         // الهدف الإجمالي الذي نريد الوصول إليه (بحد أقصى)
    let timerInterval = null;
    let isPaused = false;
    let isRunning = false;          // هل المؤقت في وضع التشغيل (لم ينته بعد)

    // مساعد تحديث واجهة العداد بناءً على totalSeconds
    function updateDisplay() {
      let hours = Math.floor(totalSeconds / 3600);
      let minutes = Math.floor((totalSeconds % 3600) / 60);
      let secs = totalSeconds % 60;
      
      hoursEl.textContent = String(hours).padStart(2, '0');
      minutesEl.textContent = String(minutes).padStart(2, '0');
      secondsEl.textContent = String(secs).padStart(2, '0');
    }

    // إيقاف التايمر بشكل كامل
    function stopTimerClean() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      isRunning = false;
      isPaused = false;
      // إزالة تأثير التوقف البصري
      document.querySelectorAll('.card').forEach(card => {
        card.style.opacity = '';
        card.style.filter = '';
      });
    }

    // بدء التايمر من الحالة الحالية (إما مستمر أو متجدد)
    function startCountUp() {
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        // فقط إذا لم يكن في وضع الإيقاف المؤقت والمؤقت لا يزال قيد التشغيل (لم نصل للهدف)
        if (!isPaused && isRunning) {
          // زيادة الثانية
          totalSeconds++;
          updateDisplay();
          
          // التحقق من الوصول إلى الهدف
          if (totalSeconds >= targetSeconds) {
            // انتهى المؤقت تماماً
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            isPaused = false;
            // إعادة تعيين البصريات
            document.querySelectorAll('.card').forEach(card => {
              card.style.opacity = '';
            });
            // اختياري: إشعار اهتزاز ناعم إذا كان مدعوماً (ليس إلزامياً)
            if (navigator.vibrate) navigator.vibrate(200);
          }
        }
      }, 1000);
    }

    // دالة بدء العد الجديد من الصفر
    function initiateNewTimer(secondsTarget) {
      // إنهاء أي مؤقت سابق
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      
      targetSeconds = secondsTarget;
      totalSeconds = 0;
      isPaused = false;
      isRunning = true;
      
      updateDisplay();
      
      // إزالة أي تأثير pause متبقي
      document.querySelectorAll('.card').forEach(card => {
        card.style.opacity = '';
        card.style.filter = '';
      });
      
      // بدء التحديث التصاعدي
      startCountUp();
    }
    
    // حدث النقر على زر البدء
    startBtn.addEventListener('click', () => {
      let h = parseInt(hoursInput.value) || 0;
      let m = parseInt(minutesInput.value) || 0;
      let s = parseInt(secondsInput.value) || 0;
      
      // التأكد من عدم وجود قيم سالبة
      h = Math.max(0, h);
      m = Math.max(0, m);
      s = Math.max(0, s);
      
      const totalTarget = (h * 3600) + (m * 60) + s;
      
      if (totalTarget <= 0) {
        // إذا كان الوقت صفراً لا نبدأ
        return;
      }
      
      // إخفاء شاشة البداية وإظهار شاشة المؤقت
      startScreen.style.display = 'none';
      timerScreen.style.display = 'flex';
      
      // بدء المؤقت الجديد
      initiateNewTimer(totalTarget);
    });
    
    // دعم النقر المزدوج على شاشة المؤقت للتشغيل/الإيقاف المؤقت
    timerScreen.addEventListener('dblclick', (e) => {
      // منع انتشار الأحداث إذا كان داخل أطفال
      e.stopPropagation();
      
      // فقط إذا كان المؤقت يعمل (لم ينتهِ بعد) وأيضاً targetSeconds محدد
      if (!isRunning) return;
      
      // تبديل حالة الإيقاف المؤقت
      isPaused = !isPaused;
      
      // تأثير بصري بسيط للإيقاف المؤقت
      const cards = document.querySelectorAll('.card');
      if (isPaused) {
        cards.forEach(card => {
          card.style.opacity = '0.65';
          card.style.filter = 'grayscale(0.2)';
        });
      } else {
        cards.forEach(card => {
          card.style.opacity = '';
          card.style.filter = '';
        });
      }
      
      // إضافة لمسة ثانوية: لا حاجة لإعادة جدولة التايمر، لأن setInterval يعمل ويستجيب للعلم isPaused
      // (المؤقت يعمل بالفعل ويتحقق كل ثانية isPaused)
    });
    
    // منع أي سلوك غير مرغوب فيه عند النقر على شاشة البداية
    // إضافة معالجة للصفحة في حالة العودة إلى الخلفية أو إعادة الفتح – الحفاظ على الحالة
    window.addEventListener('beforeunload', () => {
      if (timerInterval) {
        // لا داعي لإنهاء بقوة ، فقط نتجنب حفظ أي شيء لأننا نريد سلوك بسيط
      }
    });
    
    // إضافة دعم لخدمة الـ PWA (Service Worker) لتخزين الكاش وجعل التطبيق يعمل بدون إنترنت
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // إنشاء Service Worker ديناميكي داخل كود لضمان عمل PWA بشكل كامل
        const swCode = `
          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request).then(response => {
                return response || fetch(event.request);
              })
            );
          });
          self.addEventListener('install', event => {
            self.skipWaiting();
            event.waitUntil(
              caches.open('timer-v1').then(cache => {
                return cache.addAll(['/', '/index.html']);
              })
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).then(reg => {
          console.log('Service Worker registered successfully for PWA');
          URL.revokeObjectURL(swUrl);
        }).catch(err => console.log('SW registration failed:', err));
      });
    }
    
    // إصلاح تحسين العرض للمرة الأولى: إذا حاول المستخدم الضغط على زر البدء بأكثر من طريقة
    // التأكد من أن المدخلات لا تسمح بقيم فارغة تؤدي لـ NaN
    [hoursInput, minutesInput, secondsInput].forEach(inp => {
      inp.addEventListener('change', function() {
        if (this.value === '' || this.value === null) this.value = 0;
        let v = parseInt(this.value);
        if (isNaN(v)) this.value = 0;
        else if (v < 0) this.value = 0;
      });
    });
    
    // دعم حالة الهاتف: إذا تم إخفاء التطبيق، لا نريد مشاكل — مؤقتنا دقيق 
    // ولن يؤثر ذلك على الأداء. الحل الأمثل: إعادة تزامن المدة غير مطلوب
    
    // ميزة إضافية: عند إعادة فتح التطبيق من التثبيت، التأكد من عدم وجود شاشة عالقة
    // التأكد من أن startScreen مرئي في البداية فقط
    startScreen.style.display = 'flex';
    timerScreen.style.display = 'none';
    
    // إعادة ضبط كاملة لأي حالة سابقة إذا تم تحميل الصفحة مرة ثانية
    if (timerInterval) clearInterval(timerInterval);
    isRunning = false;
    isPaused = false;
    totalSeconds = 0;
    targetSeconds = 0;
    updateDisplay();
  })();
</script>
</body>
